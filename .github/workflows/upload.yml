name: Magnet to Rclone Zip

on:
  workflow_dispatch:
    inputs:
      magnet_link:
        description: 'Magnet Link'
        required: true
      remote_name:
        description: 'The name of the remote in your rclone.conf'
        required: true
        default: 'remote'

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip rclone

      - name: Download Magnet
        run: |
          mkdir -p downloads
          # Download and stop seeding immediately
          aria2c --seed-time=0 \
                 --summary-interval=5 \
                 --dir=./downloads \
                 "${{ github.event.inputs.magnet_link }}"

      - name: Zip with Real Folder Name
        id: naming
        run: |
          # Identify the actual folder or file name inside the downloads directory
          REAL_NAME=$(ls downloads | head -n 1)
          echo "Detected Name: $REAL_NAME"
          
          # Save the name to environment variables for the next step
          echo "REAL_NAME=$REAL_NAME" >> $GITHUB_ENV
          
          # Zip the content using the real name
          # -j is NOT used because we want the real folder structure
          cd downloads && zip -r "../${REAL_NAME}.zip" "$REAL_NAME"

      - name: Upload via Rclone
        run: |
          # Uses the rclone.conf in root and the dynamic zip name
          rclone --config ./rclone.conf copy "${{ env.REAL_NAME }}.zip" "${{ github.event.inputs.remote_name }}:Downloads/"
