name: Magnet to Rclone Zip

on:
  workflow_dispatch:
    inputs:
      magnet_link:
        description: 'Magnet Link'
        required: true
      remote_name:
        description: 'The name of the remote in your rclone.conf'
        required: true
        default: 'remote'

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip rclone

      - name: Download Magnet
        run: |
          mkdir -p downloads
          # Downloads the file and stops seeding immediately
          aria2c --seed-time=0 \
                 --summary-interval=5 \
                 --dir=./downloads \
                 "${{ github.event.inputs.magnet_link }}"

      - name: Zip Downloaded Content
        run: |
          zip -r transfer_archive.zip ./downloads

      - name: Upload via Rclone
        run: |
          # Uses the rclone.conf file located in the root of your repo
          rclone --config ./rclone.conf copy transfer_archive.zip "${{ github.event.inputs.remote_name }}:Downloads/"
