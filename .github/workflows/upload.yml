name: Download & Upload (Multi-Remote)

on:
  workflow_dispatch:
    inputs:
      manual_url:
        description: 'Single direct link (Overrides urls.txt)'
        required: false
        default: ''
      rclone_remote:
        description: 'Remote Name (e.g., GDrive Ben, Mega - Ben, Dropbox - Zegroh)'
        required: true
        default: 'GDrive Ben'
      upload_path:
        description: 'Destination path (e.g., /Downloads/)'
        required: false
        default: '/'

jobs:
  transfer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Latest Tools
        run: |
          sudo apt-get update
          # Use official rclone install script for absolute latest version
          sudo -v ; curl https://rclone.org/install.sh | sudo bash
          sudo apt-get install -y aria2
          
          echo "Tool Versions:"
          aria2c --version | head -n 1
          rclone version

      - name: Configure Rclone
        run: |
          mkdir -p ~/.config/rclone/
          if [ -z "${{ secrets.RCLONE_CONFIG }}" ]; then
            echo "::error::RCLONE_CONFIG secret is missing!"
            exit 1
          fi
          echo "${{ secrets.RCLONE_CONFIG }}" > ~/.config/rclone/rclone.conf
          echo "✅ Rclone configured."
          echo "--- Available Remotes ---"
          rclone listremotes

      - name: Verify Remote
        run: |
          REMOTE="${{ github.event.inputs.rclone_remote }}"
          echo "Testing connection to: $REMOTE"
          if ! rclone lsd "$REMOTE:" --max-depth 1; then
            echo "::warning::Check if '$REMOTE' supports listing. If not, this is normal."
          fi

      - name: Prepare Links
        id: prep
        run: |
          if [ ! -z "${{ github.event.inputs.manual_url }}" ]; then
            echo "${{ github.event.inputs.manual_url }}" > processed_links.txt
          elif [ -f "urls.txt" ]; then
            grep -v '^#' urls.txt | grep -v '^$' > processed_links.txt || true
          fi
          
          if [ ! -s processed_links.txt ]; then
            echo "::error::No links found!"
            exit 1
          fi

      - name: Transfer Files
        run: |
          REMOTE="${{ github.event.inputs.rclone_remote }}"
          UPLOAD_PATH="${{ github.event.inputs.upload_path }}"
          
          while IFS= read -r URL; do
            echo "--- Processing: $URL ---"
            FILENAME=$(basename "$URL" | cut -d'?' -f1)
            
            echo "Step 1: Downloading $FILENAME..."
            # aria2c showing progress every 10 seconds
            if ! aria2c -x 16 -s 16 -o "$FILENAME" "$URL" --summary-interval=10; then
              echo "::error::Download failed!"
              continue
            fi
            
            echo "Step 2: Uploading $FILENAME to $REMOTE..."
            # rclone showing progress every 10 seconds with --stats 10s
            if ! rclone copy -P --stats 10s "$FILENAME" "$REMOTE:$UPLOAD_PATH"; then
              echo "::error::Upload failed. Retrying with verbose logs..."
              rclone copy -vv "$FILENAME" "$REMOTE:$UPLOAD_PATH"
            else
              echo "✅ Successfully uploaded $FILENAME"
            fi
            
            rm -f "$FILENAME"
          done < processed_links.txt

      - name: Cleanup
        if: always()
        run: rm -f ~/.config/rclone/rclone.conf processed_links.txt
