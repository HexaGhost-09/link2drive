name: Download & Upload (Docker Optimized)

on:
  push:
    paths:
      - 'urls.txt'
  workflow_dispatch:
    inputs:
      manual_url:
        description: 'Direct Link or Magnet/Torrent'
        required: false
      rclone_remote:
        description: 'Remote Name (e.g., drime, gdrive)'
        required: true
        default: 'drime'
      upload_path:
        description: 'Destination path'
        required: false
        default: '/'

jobs:
  transfer:
    runs-on: ubuntu-latest
    # We use a container to ensure all tools are pre-installed and consistent
    container: 
      image: ubuntu:22.04 # In a real scenario, you'd use your own image here (e.g., username/link2drive:latest)

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # If using a raw ubuntu image in the 'container' field, we still run a quick setup.
      # Ideally, you build the Dockerfile above once and reference it here.
      - name: Setup Environment
        run: |
          apt-get update && apt-get install -y curl aria2 bc zip nodejs npm
          curl https://rclone.org/install.sh | bash
          npm install -g apkmirror-downloader

      - name: Configure Rclone
        run: |
          mkdir -p ~/.config/rclone/
          cp rclone.conf ~/.config/rclone/rclone.conf

      - name: Transfer Files
        run: |
          REMOTE="${{ github.event.inputs.rclone_remote || 'drime' }}"
          UPLOAD_PATH="${{ github.event.inputs.upload_path || '/' }}"
          
          # Prepare the links from urls.txt or manual input
          if [ ! -z "${{ github.event.inputs.manual_url }}" ]; then
            echo "${{ github.event.inputs.manual_url }}" > links.txt
          else
            grep -v '^#' urls.txt | grep -v '^$' > links.txt || true
          fi
          
          mkdir -p downloads_temp
          
          while IFS= read -r URL; do
            rm -rf downloads_temp/*
            
            # Using the tools already available in the container
            if [[ "$URL" == *"apkmirror.com"* ]]; then
              ORG=$(echo "$URL" | awk -F'/' '{print $5}')
              REPO=$(echo "$URL" | awk -F'/' '{print $6}')
              apkmd --org "$ORG" --repo "$REPO" --outDir "downloads_temp"
            elif [[ "$URL" == magnet:* ]] || [[ "$URL" == *.torrent* ]]; then
              aria2c --seed-time=0 -d "downloads_temp" "$URL"
            else
              aria2c -x 16 -s 16 -d "downloads_temp" "$URL"
            fi
            
            # ZIP logic for multiple files
            ITEM_COUNT=$(ls -1 downloads_temp/ | wc -l)
            if [ "$ITEM_COUNT" -gt 1 ]; then
                FILENAME="upload_$(date +%s).zip"
                (cd downloads_temp && zip -r "../$FILENAME" .)
                rclone move -P "../$FILENAME" "$REMOTE:$UPLOAD_PATH"
            else
                rclone move -P "downloads_temp/" "$REMOTE:$UPLOAD_PATH"
            fi
          done < links.txt
