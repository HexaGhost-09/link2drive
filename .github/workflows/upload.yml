name: Download & Upload (Multi-Remote)

on:
  push:
    paths:
      - 'urls.txt'
  workflow_dispatch:
    inputs:
      manual_url:
        description: 'Direct Link or Magnet/Torrent'
        required: false
        default: ''
      rclone_remote:
        description: 'Remote Name'
        required: true
        default: 'GDrive - rotatos210'
      upload_path:
        description: 'Destination path'
        required: false
        default: '/'

jobs:
  transfer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Latest Tools
        run: |
          sudo apt-get update
          sudo -v ; curl https://rclone.org/install.sh | sudo bash
          sudo apt-get install -y aria2 bc
          
          echo "Tool Versions:"
          aria2c --version | head -n 1
          rclone version

      - name: Configure Rclone
        run: |
          mkdir -p ~/.config/rclone/
          if [ -z "${{ secrets.RCLONE_CONFIG }}" ]; then
            echo "::error::RCLONE_CONFIG secret is missing!"
            exit 1
          fi
          echo "${{ secrets.RCLONE_CONFIG }}" > ~/.config/rclone/rclone.conf
          rclone listremotes

      - name: Prepare Links
        id: prep
        run: |
          if [ ! -z "${{ github.event.inputs.manual_url }}" ]; then
            echo "${{ github.event.inputs.manual_url }}" > processed_links.txt
          elif [ -f "urls.txt" ]; then
            grep -v '^#' urls.txt | grep -v '^$' > processed_links.txt || true
          fi
          
          if [ ! -s processed_links.txt ]; then
            echo "::error::No links found!"
            exit 1
          fi

      - name: Transfer Files
        run: |
          REMOTE="${{ github.event.inputs.rclone_remote }}"
          if [ -z "$REMOTE" ]; then REMOTE="GDrive - rotatos210"; fi
          UPLOAD_PATH="${{ github.event.inputs.upload_path }}"
          if [ -z "$UPLOAD_PATH" ]; then UPLOAD_PATH="/"; fi
          
          mkdir -p downloads_temp
          
          while IFS= read -r URL; do
            echo "--- Processing: $URL ---"
            rm -rf downloads_temp/*
            
            # Detect Torrent/Magnet
            if [[ "$URL" == magnet:* ]] || [[ "$URL" == *.torrent* ]]; then
              echo "✅ Torrent/Magnet Detected. Starting Monitoring..."
              
              # Run aria2c in background
              aria2c --seed-time=0 -d "downloads_temp" "$URL" --summary-interval=5 --console-log-level=warn > download_log.txt 2>&1 &
              PID=$!
              
              # Monitor Loop (Check every 10s after initial 30s)
              count=0
              while kill -0 $PID 2>/dev/null; do
                sleep 10
                count=$((count+1))
                
                if [ $count -gt 3 ]; then
                  # Parse Progress, Speed, and Total Size
                  LOG_TAIL=$(tail -n 10 download_log.txt)
                  PROGRESS=$(echo "$LOG_TAIL" | grep -o '([0-9]*%)' | tail -n 1 | tr -d '()')
                  SPEED_RAW=$(echo "$LOG_TAIL" | grep -o 'DL:[0-9.]*[A-Za-z]*' | tail -n 1 | cut -d: -f2)
                  SIZE_RAW=$(echo "$LOG_TAIL" | grep -o '/[0-9.]*[A-Za-z]*' | tail -n 1 | tr -d '/')
                  
                  # Conversion Logic
                  SPEED_KB=0
                  if [[ $SPEED_RAW == *MiB ]]; then SPEED_KB=$(echo ${SPEED_RAW%MiB} | awk '{print $1 * 1024}'); fi
                  if [[ $SPEED_RAW == *KiB ]]; then SPEED_KB=$(echo ${SPEED_RAW%KiB} | awk '{print $1 * 1}'); fi
                  
                  SIZE_MB=0
                  if [[ $SIZE_RAW == *GiB ]]; then SIZE_MB=$(echo ${SIZE_RAW%GiB} | awk '{print $1 * 1024}'); fi
                  if [[ $SIZE_RAW == *MiB ]]; then SIZE_MB=$(echo ${SIZE_RAW%MiB} | awk '{print $1 * 1}'); fi

                  echo "📊 Progress: ${PROGRESS:-0%} | Speed: ${SPEED_RAW:-0} | Size: ${SIZE_RAW:-0}"

                  # KILL LOGIC: If Size > 1GB (1024MB) AND Speed < 1MB/s (1024KB/s)
                  if (( $(echo "$SIZE_MB > 1024" | bc -l) )) && (( $(echo "$SPEED_KB < 1024" | bc -l) )); then
                    echo "::warning::Torrent too slow (<1MB/s) for a large file (>1GB). Terminating."
                    kill $PID
                    break
                  fi
                fi
              done
              wait $PID || true
            else
              # Direct Link
              aria2c -x 16 -s 16 -d "downloads_temp" "$URL" --summary-interval=10 --console-log-level=warn
            fi
            
            # Upload
            FILENAME=$(ls downloads_temp/ | head -n 1)
            if [ ! -z "$FILENAME" ]; then
              echo "Uploading $FILENAME..."
              rclone move -P --stats 10s "downloads_temp/$FILENAME" "$REMOTE:$UPLOAD_PATH"
            else
              echo "::error::No file found to upload."
            fi
            
          done < processed_links.txt

      - name: Cleanup
        if: always()
        run: rm -rf downloads_temp download_log.txt ~/.config/rclone/rclone.conf processed_links.txt
