name: Download & Upload via Rclone

on:
  workflow_dispatch:
    inputs:
      url:
        description: "Magnet or Direct URL"
        required: true
      remote_path:
        description: "Rclone destination (example: gdrive:downloads)"
        required: true

jobs:
  upload:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install -y qbittorrent-nox unzip zip p7zip-full wget curl

      - name: Setup rclone
        run: |
          mkdir -p ~/.config/rclone
          cp rclone.conf ~/.config/rclone/rclone.conf

      - name: Create download folder
        run: mkdir -p downloads

      # 🔽 Detect URL type
      - name: Detect URL type
        id: detect
        run: |
          if [[ "${{ github.event.inputs.url }}" == magnet:* ]]; then
            echo "type=magnet" >> $GITHUB_OUTPUT
          else
            echo "type=direct" >> $GITHUB_OUTPUT
          fi

      # 🔽 Download Magnet (qBittorrent)
      - name: Download via qBittorrent
        if: steps.detect.outputs.type == 'magnet'
        run: |
          qbittorrent-nox --daemon --profile=downloads
          sleep 5
          qbittorrent-nox --add-paused=false "${{ github.event.inputs.url }}"
          
          echo "Waiting for torrent to complete..."
          while true; do
            sleep 10
            progress=$(qbittorrent-nox --list | grep -i "%")
            echo "$progress"
            echo "$progress" | grep "100%" && break
          done

      # 🔽 Download Direct
      - name: Download direct file
        if: steps.detect.outputs.type == 'direct'
        run: |
          cd downloads
          wget -c "${{ github.event.inputs.url }}"

      # 🔽 Prepare (zip if multiple files)
      - name: Prepare files
        run: |
          cd downloads
          count=$(ls | wc -l)

          if [ "$count" -gt 1 ]; then
            folder_name="package"
            mkdir "$folder_name"
            mv * "$folder_name"/ 2>/dev/null || true
            zip -r "${folder_name}.zip" "$folder_name"
            echo "UPLOAD_FILE=${folder_name}.zip" >> $GITHUB_ENV
          else
            file=$(ls)
            echo "UPLOAD_FILE=$file" >> $GITHUB_ENV
          fi

      # 🔽 Upload with rclone (live progress)
      - name: Upload to rclone
        run: |
          cd downloads
          rclone copy "$UPLOAD_FILE" "${{ github.event.inputs.remote_path }}" -P --stats=5s
