name: Download & Upload (Multi-Remote)

on:
  push:
    paths:
      - 'urls.txt'
  workflow_dispatch:
    inputs:
      manual_url:
        description: 'Single direct link (Overrides urls.txt)'
        required: false
        default: ''
      rclone_remote:
        description: 'Remote Name (e.g., GDrive - rotatos210, GDrive Ben, Mega - Ben)'
        required: true
        default: 'GDrive - rotatos210'
      upload_path:
        description: 'Destination path (e.g., /Downloads/)'
        required: false
        default: '/'

jobs:
  transfer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Latest Tools
        run: |
          sudo apt-get update
          sudo -v ; curl https://rclone.org/install.sh | sudo bash
          sudo apt-get install -y aria2
          
          echo "Tool Versions:"
          aria2c --version | head -n 1
          rclone version

      - name: Configure Rclone
        run: |
          mkdir -p ~/.config/rclone/
          if [ -z "${{ secrets.RCLONE_CONFIG }}" ]; then
            echo "::error::RCLONE_CONFIG secret is missing!"
            exit 1
          fi
          echo "${{ secrets.RCLONE_CONFIG }}" > ~/.config/rclone/rclone.conf
          echo "✅ Rclone configured."
          echo "--- Available Remotes ---"
          rclone listremotes

      - name: Verify Remote
        run: |
          REMOTE="${{ github.event.inputs.rclone_remote }}"
          if [ -z "$REMOTE" ]; then REMOTE="GDrive - rotatos210"; fi
          
          echo "Testing connection to: $REMOTE"
          if ! rclone lsd "$REMOTE:" --max-depth 1; then
            echo "::warning::Check if '$REMOTE' supports listing. If not, this is normal."
          fi

      - name: Prepare Links
        id: prep
        run: |
          if [ ! -z "${{ github.event.inputs.manual_url }}" ]; then
            echo "${{ github.event.inputs.manual_url }}" > processed_links.txt
          elif [ -f "urls.txt" ]; then
            grep -v '^#' urls.txt | grep -v '^$' > processed_links.txt || true
          fi
          
          if [ ! -s processed_links.txt ]; then
            echo "::error::No links found!"
            exit 1
          fi

      - name: Transfer Files
        run: |
          REMOTE="${{ github.event.inputs.rclone_remote }}"
          if [ -z "$REMOTE" ]; then REMOTE="GDrive - rotatos210"; fi
          UPLOAD_PATH="${{ github.event.inputs.upload_path }}"
          if [ -z "$UPLOAD_PATH" ]; then UPLOAD_PATH="/"; fi
          
          # Create a clean download directory
          mkdir -p downloads_temp
          
          while IFS= read -r URL; do
            echo "--- Processing: $URL ---"
            
            # Clear the temp folder for each download
            rm -rf downloads_temp/*
            
            echo "Step 1: Downloading..."
            # We don't use -o here. 
            # aria2c will automatically detect the name from the server (Content-Disposition)
            if ! aria2c -x 16 -s 16 -d "downloads_temp" "$URL" --summary-interval=10 --console-log-level=warn; then
              echo "::error::Download failed!"
              continue
            fi
            
            # Identify the file that was just downloaded
            FILENAME=$(ls downloads_temp/ | head -n 1)
            
            if [ -z "$FILENAME" ]; then
                echo "::error::No file found after download!"
                continue
            fi

            echo "Detected Filename: $FILENAME"
            
            echo "Step 2: Uploading $FILENAME to $REMOTE..."
            if ! rclone move -P --stats 10s "downloads_temp/$FILENAME" "$REMOTE:$UPLOAD_PATH"; then
              echo "::error::Upload failed. Retrying with verbose logs..."
              rclone move -vv "downloads_temp/$FILENAME" "$REMOTE:$UPLOAD_PATH"
            else
              echo "✅ Successfully uploaded $FILENAME"
            fi
            
          done < processed_links.txt

      - name: Cleanup
        if: always()
        run: |
          rm -rf downloads_temp
          rm -f ~/.config/rclone/rclone.conf processed_links.txt
