name: Download & Upload to Google Drive

on:
  workflow_dispatch:
    inputs:
      download_url:
        description: 'Direct Link or Magnet/Torrent URL'
        required: true
      folder_id:
        description: 'Google Drive Folder ID (e.g., 1A2b3C4d...)'
        required: true

jobs:
  transfer:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Download Tools (aria2 & zip)
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 zip

      - name: Fetch File (Direct or Magnet)
        run: |
          mkdir -p downloads_temp
          URL="${{ github.event.inputs.download_url }}"
          
          if [[ "$URL" == magnet:* ]] || [[ "$URL" == *.torrent* ]]; then
            echo "🧲 Magnet/Torrent Detected. Starting download..."
            aria2c --seed-time=0 -d "downloads_temp" "$URL"
          else
            echo "🔗 Direct Link Detected. Starting download..."
            aria2c -x 16 -s 16 -d "downloads_temp" "$URL"
          fi
          
          # Check if multiple files downloaded and zip them if necessary
          ITEM_COUNT=$(ls -1 downloads_temp/ 2>/dev/null | wc -l || echo 0)
          FIRST_ITEM=$(ls downloads_temp/ | head -n 1)
          
          if [ "$ITEM_COUNT" -gt 1 ] || [ -d "downloads_temp/$FIRST_ITEM" ]; then
              echo "📦 Multiple files or folder detected. Zipping contents..."
              ZIP_NAME="${FIRST_ITEM// /_}.zip"
              (cd downloads_temp && zip -r "../$ZIP_NAME" .)
              rm -rf downloads_temp/*
              mv "$ZIP_NAME" downloads_temp/
          fi

      - name: Upload directly to Google Drive
        uses: adityak74/google-drive-upload-git-action@v0.3
        with:
          # This pulls the Base64 JSON text you saved in your GitHub Secrets
          credentials: ${{ secrets.GDRIVE_CREDENTIALS }}
          filename: "downloads_temp/*"
          # This pulls the Folder ID you paste when you run the workflow
          folderId: ${{ github.event.inputs.folder_id }}
          overwrite: "true"
