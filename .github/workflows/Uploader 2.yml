name: Magnet to Rclone Direct Upload

on:
  workflow_dispatch:
    inputs:
      magnet_link:
        description: 'Magnet Link'
        required: true
      remote_name:
        description: 'The name of the remote in your rclone.conf'
        required: true
        default: 'remote'

jobs:
  transfer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y aria2 rclone

      - name: Download Magnet
        run: |
          mkdir -p downloads
          echo "Starting High-Speed aria2 Download..."
          
          # Download with boosted peer limits and fast disk allocation
          aria2c --seed-time=0 \
                 --summary-interval=5 \
                 --dir=./downloads \
                 --bt-max-peers=120 \
                 --file-allocation=falloc \
                 "${{ github.event.inputs.magnet_link }}"

      - name: Upload via Rclone
        run: |
          echo "Starting High-Speed Rclone Upload..."
          
          # Uses the rclone.conf in root and maxes out upload bandwidth
          rclone --config ./rclone.conf copy ./downloads/ "${{ github.event.inputs.remote_name }}:Downloads/" \
            --progress \
            --drive-chunk-size 128M \
            --transfers 8 \
            --checkers 16 \
            --fast-list
            
