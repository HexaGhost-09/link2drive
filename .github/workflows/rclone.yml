name: High-Speed Rclone Transfer

on:
  push:
    paths:
      - 'urls.txt'
  workflow_dispatch:
    inputs:
      manual_url:
        description: 'Direct Link or Magnet/Torrent'
        required: false
      rclone_remote:
        description: 'Remote Name (e.g., drime, gdrive)'
        required: true
        default: 'drime'
      upload_path:
        description: 'Destination path'
        required: false
        default: '/'

jobs:
  transfer:
    runs-on: ubuntu-latest
    # Runs inside the optimized container
    container: 
      image: ubuntu:22.04 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # Quick sync of tools if not using a pre-built image
      - name: Quick Tool Sync
        run: |
          apt-get update && apt-get install -y curl aria2 bc zip nodejs npm
          curl https://rclone.org/install.sh | bash
          npm install -g apkmirror-downloader

      - name: Configure Rclone
        run: |
          mkdir -p ~/.config/rclone/
          if [ -f "rclone.conf" ]; then
            cp rclone.conf ~/.config/rclone/rclone.conf
          fi

      - name: Multi-Threaded Transfer
        run: |
          REMOTE="${{ github.event.inputs.rclone_remote || 'drime' }}"
          UPLOAD_PATH="${{ github.event.inputs.upload_path || '/' }}"
          
          # Prepare links from urls.txt or manual input
          if [ ! -z "${{ github.event.inputs.manual_url }}" ]; then
            echo "${{ github.event.inputs.manual_url }}" > links.txt
          else
            grep -v '^#' urls.txt | grep -v '^$' > links.txt || true
          fi
          
          mkdir -p downloads_temp
          
          while IFS= read -r URL; do
            echo "--- Processing: $URL ---"
            rm -rf downloads_temp/*
            
            # 1. DOWNLOAD PHASE (aria2c)
            if [[ "$URL" == *"apkmirror.com"* ]]; then
              apkmd --org "$(echo "$URL" | awk -F'/' '{print $5}')" --repo "$(echo "$URL" | awk -F'/' '{print $6}')" --outDir "downloads_temp"
            
            elif [[ "$URL" == magnet:* ]] || [[ "$URL" == *.torrent* ]]; then
              echo "🧲 Magnet/Torrent Detected - Killing process at 100%"
              # --seed-ratio=0.0 stops the process immediately so rclone can start
              aria2c --seed-time=0 --seed-ratio=0.0 --bt-stop-timeout=60 -d "downloads_temp" "$URL"
            
            else
              echo "🔗 Direct Link Detected - 16 Threads High Speed"
              # 16 simultaneous connections for maximum bandwidth usage
              aria2c -x 16 -s 16 -k 1M -d "downloads_temp" "$URL"
            fi
            
            # 2. UPLOAD PHASE (rclone)
            # This starts as soon as aria2c exits
            ITEM_COUNT=$(ls -1 downloads_temp/ | wc -l)
            if [ "$ITEM_COUNT" -gt 0 ]; then
                # Zip if multiple files are present
                if [ "$ITEM_COUNT" -gt 1 ] || [ -d "downloads_temp/$(ls downloads_temp/ | head -n 1)" ]; then
                    FILENAME="bundle_$(date +%s).zip"
                    (cd downloads_temp && zip -r "../$FILENAME" .)
                    echo "🚀 Uploading ZIP to $REMOTE..."
                    rclone move -P "../$FILENAME" "$REMOTE:$UPLOAD_PATH"
                else
                    echo "🚀 Uploading file to $REMOTE..."
                    rclone move -P "downloads_temp/" "$REMOTE:$UPLOAD_PATH"
                fi
            fi
          done < links.txt

      - name: Cleanup
        if: always()
        run: rm -rf downloads_temp links.txt
