name: High-Speed Rclone Transfer

on:
  push:
    paths:
      - 'urls.txt'
  workflow_dispatch:
    inputs:
      manual_url:
        description: 'Direct Link or Magnet/Torrent'
        required: false
      rclone_remote:
        description: 'Remote (drime, gdrive, etc.)'
        required: true
        default: 'drime'
      upload_path:
        description: 'Destination path'
        required: false
        default: '/'

jobs:
  transfer:
    runs-on: ubuntu-latest
    # POWER TIP: For maximum speed, build your Dockerfile, 
    # push it to GitHub Packages (GHCR), and use that image here.
    container: 
      image: ubuntu:22.04 

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      # This step is only needed if you haven't pushed your image to a registry yet.
      # If you use a pre-built image, you can delete this entire step for instant starts.
      - name: Quick Tool Sync
        run: |
          apt-get update && apt-get install -y curl aria2 zip nodejs npm
          curl https://rclone.org/install.sh | bash
          npm install -g apkmirror-downloader

      - name: Configure Rclone
        run: |
          mkdir -p ~/.config/rclone/
          cp rclone.conf ~/.config/rclone/rclone.conf

      - name: Multi-Threaded Transfer
        run: |
          REMOTE="${{ github.event.inputs.rclone_remote || 'drime' }}"
          UPLOAD_PATH="${{ github.event.inputs.upload_path || '/' }}"
          
          # Prepare links
          if [ ! -z "${{ github.event.inputs.manual_url }}" ]; then
            echo "${{ github.event.inputs.manual_url }}" > links.txt
          else
            grep -v '^#' urls.txt | grep -v '^$' > links.txt || true
          fi
          
          mkdir -p downloads_temp
          
          while IFS= read -r URL; do
            rm -rf downloads_temp/*
            
            # HIGH-SPEED DOWNLOAD LOGIC
            if [[ "$URL" == *"apkmirror.com"* ]]; then
              ORG=$(echo "$URL" | awk -F'/' '{print $5}')
              REPO=$(echo "$URL" | awk -F'/' '{print $6}')
              apkmd --org "$ORG" --repo "$REPO" --outDir "downloads_temp"
            elif [[ "$URL" == magnet:* ]] || [[ "$URL" == *.torrent* ]]; then
              # NO SEEDING: Added --seed-ratio=0.0 and aggressive peer discovery
              aria2c --seed-time=0 --seed-ratio=0.0 --bt-stop-timeout=60 \
                     --bt-tracker-connect-timeout=10 --bt-tracker-timeout=10 \
                     -d "downloads_temp" "$URL"
            else
              # MULTI-THREADED: 16 connections for max speed
              aria2c -x 16 -s 16 -k 1M -d "downloads_temp" "$URL"
            fi
            
            # ZIP & UPLOAD
            ITEM_COUNT=$(ls -1 downloads_temp/ | wc -l)
            if [ "$ITEM_COUNT" -gt 0 ]; then
                if [ "$ITEM_COUNT" -gt 1 ]; then
                    FILENAME="bundle_$(date +%s).zip"
                    (cd downloads_temp && zip -r "../$FILENAME" .)
                    rclone move -P "../$FILENAME" "$REMOTE:$UPLOAD_PATH"
                else
                    rclone move -P "downloads_temp/" "$REMOTE:$UPLOAD_PATH"
                fi
            fi
          done < links.txt
